<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Carreiras de Tech</title>
</head>
<body>
    <header>
        <h1>Formulário de Contato - Dúvidas. </h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
    </nav>

    <main>

        <p>Preencha os dados abaixo para receber um guia de estudos gratuito no seu e-mail.</p>
        <p>Use o campo de Mensagem para tirar suas dúvidas.</p>
        <form>
            
           
            <!--Nome-->
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
            <br><br>

            <!--E-mail-->
            <label for="email">E-mail:</label>
            <input type="email" id="email" nome="E-mail" placeholder="Digite seu e-mail">
            <br><br>

            <!--Área favorita-->
            <label for="area">Área favorita:</label>
            <select type="area" nome="area">
                <option value="">Selecione</option>
                <option>Desenvolvimento de Software</option>
                <option>Ciência de Dados</option>
                <option>Segurança da Informação</option>
                <option>Cloud Computing</option>
            </select>
            <br><br>

            
            <!--Mensagem-->
            <label>Mensagem:</label>
            <textarea name="Mensagem" rows="5" cols="55" placeholder="Digite aqui suas dúvidas..."></textarea>
            <br>
            <br>

            <button>Enviar</button>
            <button>Limpar</button>

        </form>

    </main>
   

     <footer>
        ©Copyright - Carreiras de Tech
     </footer>
    
</body>
</html>
